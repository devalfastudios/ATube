<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atube — Premium Video Host</title>
    <style>
        :root {
            --m3-surface: #1c1b1f;
            --m3-primary: #d0bcff;
            --m3-on-surface: #e6e1e5;
            --m3-variant: #49454f;
            --glass: rgba(28, 27, 31, 0.7);
        }

        body {
            background: #0f0f0f;
            color: var(--m3-on-surface);
            font-family: 'Segoe UI Variable Display', 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Mica Effect & Blur */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            animation: slideDown 0.6s ease;
        }

        .logo {
            color: #ff0000;
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-right: 40px;
            cursor: pointer;
        }

        .search-area {
            flex: 1;
            max-width: 640px;
            display: flex;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2px 6px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-area:focus-within {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--m3-primary);
            box-shadow: 0 0 15px rgba(208, 188, 255, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 16px;
            font-size: 16px;
            outline: none;
        }

        .btn-search {
            background: var(--m3-primary);
            color: #381e72;
            border: none;
            padding: 0 24px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-search:hover { transform: scale(1.03); opacity: 0.9; }

        /* Grid & Cards */
        .main-content {
            padding: 32px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .v-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
        }

        .v-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .v-card:hover {
            transform: scale(1.04);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            pointer-events: auto;
        }

        .v-meta { padding: 16px; }

        .v-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Animations */
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Skeleton loader */
        .skeleton {
            background: linear-gradient(90deg, #222 25%, #333 50%, #222 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 12px;
            height: 180px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">Atube</div>
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="Поиск видео по всему миру...">
        <button class="btn-search" onclick="doSearch()">Найти</button>
    </div>
</header>

<div class="main-content" id="videoGrid">
    <div class="v-card show"><div class="skeleton"></div></div>
    <div class="v-card show"><div class="skeleton"></div></div>
    <div class="v-card show"><div class="skeleton"></div></div>
</div>

<script>
    // Твой официальный ключ из консоли (без лишних знаков)
    const ATUBE_KEY = 'AIzaSyDTPvbauyBlCMg0F_9JPEWsMxtQwnxOBSw'; 

    async function apiRequest(endpoint) {
        // Используем твой ключ напрямую в строке
        const url = `https://www.googleapis.com/youtube/v3/${endpoint}&key=${ATUBE_KEY}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.error) {
                console.error("YouTube API Error:", data.error.message);
                alert("Ошибка ключа: " + data.error.message);
                return null;
            }
            return data.items;
        } catch (e) {
            console.error("Network error");
            return null;
        }
    }

    async function doSearch() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;

        // encodeURIComponent предотвращает ошибки при вводе кириллицы или спецсимволов
        const encodedQuery = encodeURIComponent(query);
        const results = await apiRequest(`search?part=snippet&maxResults=15&q=${encodedQuery}&type=video`);
        if (results) render(results);
    }

    async function loadTrends() {
        // Тренды региона Украина (UA)
        const trends = await apiRequest(`videos?part=snippet&chart=mostPopular&regionCode=UA&maxResults=15`);
        if (trends) render(trends);
    }

    function render(items) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = '';
        
        items.forEach((item, index) => {
            const id = item.id.videoId || item.id;
            const card = document.createElement('div');
            card.className = 'v-card';
            
            // Плавная задержка появления для каждой карточки
            setTimeout(() => card.classList.add('show'), index * 100);

            card.innerHTML = `
                <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
                <div class="v-meta">
                    <div class="v-title">${item.snippet.title}</div>
                    <div style="font-size: 12px; color: #aaa;">${item.snippet.channelTitle}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Слушатель клавиши Enter
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') doSearch();
    });

    // Старт приложения
    loadTrends();
</script>

</body>
</html>
