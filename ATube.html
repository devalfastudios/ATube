<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Atube — Material Design</title>
    <style>
        :root {
            --surface: #1a1c1e;
            --on-surface: #e2e2e6;
            --primary: #d0bcff;
            --error: #ffb4ab;
        }

        body {
            background-color: #0b0e11;
            color: var(--on-surface);
            font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Шапка в стиле Windows 11 (Mica effect) */
        header {
            width: 100%;
            padding: 12px 0;
            background: rgba(26, 28, 30, 0.8);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
        }

        .search-container {
            width: 100%;
            max-width: 720px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 4px 16px;
            transition: 0.2s;
        }

        .search-container:focus-within {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(208, 188, 255, 0.2);
        }

        .logo {
            position: absolute;
            left: 24px;
            color: #ff0000;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            font-size: 16px;
            outline: none;
        }

        button {
            background: var(--primary);
            color: #381e72;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 8px;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: scale(1.02); }

        /* Сетка видео */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            width: 95%;
            max-width: 1400px;
            padding: 32px 0;
        }

        /* Карточка в стиле Material 3 */
        .v-card {
            background: #232a31;
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.2, 0, 0, 1);
            border: 1px solid rgba(255,255,255,0.03);
        }

        .v-card:hover {
            transform: translateY(-4px);
            background: #2c343d;
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
        }

        .v-info { padding: 16px; }

        .v-title {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #status {
            color: var(--error);
            margin: 20px;
            padding: 12px 24px;
            background: rgba(255, 180, 171, 0.1);
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Atube</div>
    <div class="search-container">
        <input type="text" id="sInp" placeholder="Поиск на Atube...">
        <button onclick="runSearch()">Найти</button>
    </div>
</header>

<div id="status"></div>

<div class="grid" id="mainGrid"></div>

<script>
    // Твой проверенный ключ
    const KEY = 'AIzaSyDTPvbauyBlCMg0F_9JPEWsMxtQwnxOBSw';

    async function callApi(params) {
        const url = `https://www.googleapis.com/youtube/v3/${params}&key=${KEY}`;
        try {
            const r = await fetch(url);
            const d = await r.json();
            if (d.error) {
                document.getElementById('status').innerText = "Ошибка: " + d.error.message;
                document.getElementById('status').style.display = 'block';
                return null;
            }
            return d.items;
        } catch (e) {
            return null;
        }
    }

    async function loadTrends() {
        const items = await callApi('videos?part=snippet&chart=mostPopular&regionCode=RU&maxResults=12');
        if (items) draw(items);
    }

    async function runSearch() {
        const q = document.getElementById('sInp').value;
        if (!q) return;
        const items = await callApi(`search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=12`);
        if (items) draw(items);
    }

    function draw(items) {
        const g = document.getElementById('mainGrid');
        g.innerHTML = '';
        items.forEach(i => {
            const id = i.id.videoId || i.id;
            g.innerHTML += `
                <div class="v-card">
                    <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
                    <div class="v-info">
                        <div class="v-title">${i.snippet.title}</div>
                    </div>
                </div>`;
        });
    }

    loadTrends();
</script>

</body>
</html>
